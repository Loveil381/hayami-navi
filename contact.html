    <style>
a:hover {
  text-decoration: none;
}

.form-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 36px 32px;
  margin-bottom: 24px;
  max-width: 640px;
}

.form-field {
  margin-bottom: 20px;
}

.form-field label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 6px;
}

.form-field .required {
  color: #d9534f;
  font-size: 12px;
  margin-left: 4px;
}

.form-field input,
.form-field textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--color-border);
  border-radius: 6px;
  font-size: 15px;
  font-family: inherit;
  color: var(--color-text);
  background: var(--color-bg);
  transition: border-color var(--transition), box-shadow var(--transition);
}

.form-field input:focus,
.form-field textarea:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(26, 107, 74, .12);
}

.form-field textarea {
  min-height: 180px;
  resize: vertical;
  line-height: 1.7;
}

.form-field input::placeholder,
.form-field textarea::placeholder {
  color: #b0bec5;
}

.submit-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--color-primary);
  color: #fff;
  border: none;
  padding: 14px 36px;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
}

.submit-btn:hover {
  background: var(--color-primary-hover, #145839);
  transform: translateY(-1px);
}

.submit-btn:active {
  transform: translateY(0);
}

@media (max-width:640px) {
  .header__inner {
    padding: 12px 16px;
  }

  .header__title {
    font-size: 16px;
  }

  .subnav__inner {
    padding: 0 12px;
  }

  .subnav__link {
    padding: 10px 12px;
    font-size: 12px;
  }

  .main {
    padding: 16px 16px 40px;
  }

  .page-title {
    font-size: 20px;
  }

  .form-card {
    padding: 24px 18px;
  }
}
    </style>

<body>

    <!-- Header -->
    <header class="header" role="banner">
        <div class="header__inner">
            <a href="index.html" class="header__home" aria-label="便利ツール集トップへ">
                <span class="header__icon" aria-hidden="true">🛠️</span>
                <span class="header__title">便利ツール集</span>
            </a>

    <!-- Sub Navigation -->
    <nav class="subnav" aria-label="ツールナビゲーション">

            <a href="nenrei.html" class="subnav__link">年齢早見表</a>
            <a href="wareki.html" class="subnav__link">西暦⇔和暦</a>

            <a href="gakureki.html" class="subnav__link">入学・卒業年度</a>
            <a href="yakudoshi.html" class="subnav__link">厄年早見表</a>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="index.html">ホーム</a> &gt; お問い合わせ
    </div>

    <!-- Main -->
    <main class="main">
        <h1 class="page-title">お問い合わせ</h1>
        <p class="page-subtitle">当サイトに関するご意見・ご要望・ご質問は、下記フォームよりお送りください。</p>

        <form class="form-card" action="https://formspree.io/f/xaqdjpje" method="POST">

            <div class="form-field">
                <label for="name">お名前<span class="required">*必須</span></label>
                <input type="text" id="name" name="name" placeholder="例：山田 太郎" required autocomplete="name">
            </div>

            <div class="form-field">
                <label for="email">メールアドレス<span class="required">*必須</span></label>
                <input type="email" id="email" name="email" placeholder="例：example@mail.com" required
                    autocomplete="email">
            </div>

            <div class="form-field">
                <label for="message">お問い合わせ内容<span class="required">*必須</span></label>
                <textarea id="message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
            </div>

            <button type="submit" class="submit-btn">✉️ 送信する</button>

        </form>

        <div class="note">
            📌 お問い合わせは上記フォームよりお願いいたします。通常3営業日以内にご返信いたします。<br>
            ※ ご返信はご入力いただいたメールアドレス宛にお送りいたします。メールアドレスにお間違いがないようご確認ください。
        </div>

    </main>
